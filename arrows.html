<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HAROURA MASK 🎭</title>
    <style>
        body { 
            margin: 0; 
            background: #050505; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            color: #fff; 
            font-family: 'Arial', sans-serif; 
            overflow: hidden; 
            touch-action: none;
        }
        #menu { 
            position: absolute; 
            z-index: 10; 
            text-align: center; 
            background: rgba(5, 5, 5, 0.9);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #bf00ff;
        }
        #stats {
            position: absolute;
            top: 15px;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px #bf00ff;
            z-index: 5;
            background: rgba(0,0,0,0.6);
            padding: 5px 15px;
            border-radius: 20px;
        }
        canvas { 
            display: block;
            box-shadow: 0 0 30px #bf00ff; 
            cursor: pointer; 
        }
        button { 
            padding: 15px 30px; 
            font-size: 22px; 
            background: #bf00ff; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            box-shadow: 0 0 15px #bf00ff;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="menu">
        <h1>HAROURA MASK</h1>
        <p>1000 مستوى من التحدي! 🎭</p>
        <button onclick="startGame()">ابدأ الرحلة 🚀</button>
    </div>
    <div id="stats" style="display:none">المستوى: <span id="lvl">1</span> | العملات: <span id="coins">0</span></div>
    <canvas id="gameCanvas" style="display:none"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let currentLevel = 1, coins = 0, maze = [], coinsArr = [];
        let player = { r: 1, c: 1, vx: 0, vy: 0 };
        let gameActive = false;
        
        // تجهيز وتحميل صورة القط الكيوت
        const catImage = new Image();
        catImage.src = 'lv_0_20260705182947.png';
        
        // متغيرات الحجم الديناميكي
        let cellSize = 30;
        const rows = 13;
        const cols = 10;

        function resizeCanvas() {
            const padding = 20;
            const maxWidth = window.innerWidth - padding;
            const maxHeight = window.innerHeight - padding - 60;
            
            let sizeBasedOnWidth = Math.floor(maxWidth / cols);
            let sizeBasedOnHeight = Math.floor(maxHeight / rows);
            
            cellSize = Math.min(sizeBasedOnWidth, sizeBasedOnHeight);
            
            canvas.width = cols * cellSize;
            canvas.height = rows * cellSize;
        }

        function startGame() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('stats').style.display = 'block';
            canvas.style.display = 'block';
            gameActive = true;
            resizeCanvas();
            generateMaze();
            update();
        }

        function generateMaze() {
            maze = Array(rows).fill().map(() => Array(cols).fill(1));
            coinsArr = [];
            function carve(r, c) {
                maze[r][c] = 0;
                let dirs = [[0,2], [0,-2], [2,0], [-2,0]].sort(() => Math.random() - 0.5);
                for(let [dr, dc] of dirs) {
                    let nr = r + dr, nc = c + dc;
                    if(nr > 0 && nr < rows-1 && nc > 0 && nc < cols-1 && maze[nr][nc] === 1) {
                        maze[r + dr/2][c + dc/2] = 0;
                        carve(nr, nc);
                    }
                }
            }
            carve(1, 1);
            maze[rows-2][cols-2] = 0;
            
            for(let i=0; i<Math.min(currentLevel + 5, 20); i++) {
                let rr = Math.floor(Math.random()*(rows-2))+1;
                let cc = Math.floor(Math.random()*(cols-2))+1;
                if(maze[rr][cc] === 0 && !(rr === 1 && cc === 1) && !(rr === rows-2 && cc === cols-2)) {
                    coinsArr.push({r: rr, c: cc});
                }
            }
        }

        function update() {
            if(!gameActive) return;
            if (player.vx !== 0 || player.vy !== 0) {
                let nr = player.r + player.vy, nc = player.c + player.vx;
                if (maze[nr] && maze[nr][nc] === 0) {
                    player.r = nr; player.c = nc;
                    coinsArr = coinsArr.filter(coin => {
                        if(coin.r === player.r && coin.c === player.c) { coins++; return false; }
                        return true;
                    });
                } else { player.vx = 0; player.vy = 0; }
            }
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // رسم جدران وأرضية المتاهة بالكامل
            for(let r=0; r<rows; r++) {
                for(let c=0; c<cols; c++) {
                    ctx.fillStyle = maze[r][c] ? '#1a0033' : '#000';
                    ctx.fillRect(c*cellSize, r*cellSize, cellSize, cellSize);
                    if(maze[r][c]) {
                        ctx.strokeStyle = '#bf00ff';
                        ctx.lineWidth = 0.5;
                        ctx.strokeRect(c*cellSize, r*cellSize, cellSize, cellSize);
                    }
                }
            }
            
            // رسم نقطة النهاية (خضراء)
            ctx.fillStyle = '#0f0'; 
            ctx.fillRect((cols-2)*cellSize + cellSize*0.15, (rows-2)*cellSize + cellSize*0.15, cellSize*0.7, cellSize*0.7);
            
            // رسم العملات (صفراء متوهجة)
            ctx.fillStyle = '#ff0'; 
            coinsArr.forEach(c => ctx.fillRect(c.c*cellSize + cellSize*0.3, c.r*cellSize + cellSize*0.3, cellSize*0.4, cellSize*0.4));
            
            // رسم شخصية القط بدلاً من المربع الأبيض
            ctx.drawImage(
                catImage, 
                player.c * cellSize + cellSize * 0.05, 
                player.r * cellSize + cellSize * 0.05, 
                cellSize * 0.9, 
                cellSize * 0.9
            );
            
            if (player.r === rows-2 && player.c === cols-2) {
                if(currentLevel < 1000) { 
                    currentLevel++; 
                    document.getElementById('lvl').innerText = currentLevel;
                    document.getElementById('coins').innerText = coins;
                    player = { r: 1, c: 1, vx: 0, vy: 0 }; 
                    generateMaze(); 
                }
            }
            requestAnimationFrame(update);
        }

        let startX, startY;
        canvas.addEventListener('touchstart', e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; }, {passive: true});
        canvas.addEventListener('touchend', e => {
            let dx = e.changedTouches[0].clientX - startX;
            let dy = e.changedTouches[0].clientY - startY;
            if(Math.abs(dx) > Math.abs(dy)) { if(Math.abs(dx) > 30) { player.vx = dx > 0 ? 1 : -1; player.vy = 0; } }
            else { if(Math.abs(dy) > 30) { player.vy = dy > 0 ? 1 : -1; player.vx = 0; } }
        });

        window.addEventListener('resize', () => { if(gameActive) resizeCanvas(); });
    </script>
</body>
</html>
