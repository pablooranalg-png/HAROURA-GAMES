<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة الهروب من الوحش - 7 غرف</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; user-select: none; -webkit-user-select: none; }
        body { background-color: #090d16; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: #fff; }
        
        /* لوحة المعلومات العلوبة */
        .info-panel { text-align: center; margin-bottom: 10px; width: 100%; max-width: 600px; padding: 0 10px; }
        .timer-box { font-size: 24px; font-weight: bold; color: #ef4444; text-shadow: 0 0 10px rgba(239,68,68,0.5); margin-bottom: 5px; }
        .status-msg { font-size: 18px; color: #38bdf8; height: 25px; font-weight: 600; }
        .score-box { font-size: 16px; color: #f59e0b; margin-top: 5px; }

        /* منطقة البيت (2D) */
        .house { width: 95vw; max-width: 600px; height: 320px; background-color: #1e293b; border: 4px solid #334155; border-radius: 12px; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        
        /* الغرف السبعة مرتبة أفقياً */
        .rooms-container { display: flex; width: 100%; height: 200px; border-bottom: 4px solid #334155; }
        .room { flex: 1; border-left: 2px solid #475569; position: relative; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 10px; background-color: #151f32; transition: background-color 0.3s; }
        .room:last-child { border-left: none; }
        .room-name { position: absolute; top: 10px; font-size: 12px; color: #94a3b8; font-weight: bold; }
        
        /* حالة الغرف (تفتيش الوحش) */
        .room.searched { background-color: rgba(239, 68, 68, 0.25); animation: flash 0.5s ease infinite alternate; }
        .room.safe { background-color: rgba(16, 185, 129, 0.2); }
        @keyframes flash { from { background-color: rgba(239, 68, 68, 0.15); } to { background-color: rgba(239, 68, 68, 0.4); } }

        /* الممر السفلي الذي يتحرك فيه اللاعب والوحش */
        .hallway { width: 100%; height: 112px; background-color: #0f172a; position: relative; }
        
        /* اللاعب (2D) */
        .player { width: 30px; height: 50px; background-color: #38bdf8; border-radius: 6px; position: absolute; bottom: 15px; left: 30px; z-index: 10; box-shadow: 0 0 10px #38bdf8; transition: bottom 0.2s; }
        .player::before { content: '👀'; position: absolute; top: 5px; left: 3px; font-size: 12px; }

        /* الوحش (2D) */
        .monster { width: 40px; height: 65px; background-color: #9333ea; border-radius: 6px; position: absolute; bottom: 15px; left: -60px; z-index: 9; box-shadow: 0 0 15px #9333ea; display: flex; justify-content: center; align-items: center; font-size: 20px; transition: all 0.3s ease; }

        /* شاشات النتيجة */
        .overlay-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; z-index: 30; }
        .overlay-screen h2 { font-size: 32px; margin-bottom: 15px; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .btn-restart { background: linear-gradient(135deg, #38bdf8, #0284c7); color: white; border: none; padding: 12px 35px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(56,189,248,0.4); }
        
        /* أزرار التحكم للتلفون */
        .controls { display: flex; gap: 30px; margin-top: 15px; width: 100%; max-width: 600px; justify-content: center; direction: ltr; padding: 0 10px; }
        .btn { width: 85px; height: 65px; background-color: #1e293b; border: 2px solid #475569; border-radius: 12px; color: white; font-size: 24px; font-weight: bold; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); -webkit-tap-highlight-color: transparent; }
        .btn:active { background-color: #334155; transform: scale(0.95); }
        .btn-action { background: linear-gradient(135deg, #f59e0b, #d97706); border-color: #d97706; font-size: 16px; width: 110px; }
    </style>
</head>
<body>

    <div class="info-panel">
        <div class="timer-box" id="timerText">الوقت المتبقي: 10ث</div>
        <div class="status-msg" id="statusMsg">اختر غرفة واختبئ فيها بسرعة! 🏃‍♂️</div>
        <div class="score-box" id="scoreText">عدد مرات النجاة المتتالية: 0</div>
    </div>

    <div class="house" id="houseArea">
        <div class="rooms-container" id="roomsContainer">
            <div class="room" id="room0"><span class="room-name">غرفة 1</span></div>
            <div class="room" id="room1"><span class="room-name">غرفة 2</span></div>
            <div class="room" id="room2"><span class="room-name">غرفة 3</span></div>
            <div class="room" id="room3"><span class="room-name">غرفة 4</span></div>
            <div class="room" id="room4"><span class="room-name">غرفة 5</span></div>
            <div class="room" id="room5"><span class="room-name">غرفة 6</span></div>
            <div class="room" id="room6"><span class="room-name">غرفة 7</span></div>
        </div>
        
        <div class="hallway" id="hallwayArea">
            <div class="player" id="player"></div>
            <div class="monster" id="monster">👹</div>
        </div>

        <div class="overlay-screen" id="overlayScreen">
            <h2 id="overlayTitle">Game Over!</h2>
            <p id="overlayDesc" style="margin-bottom: 20px; font-size: 18px; text-align: center; padding: 0 20px;"></p>
            <button class="btn-restart" onclick="initRound()">العب جولة جديدة</button>
        </div>
    </div>

    <div class="controls">
        <div class="btn" id="leftBtn">◀</div>
        <div class="btn btn-action" id="actionBtn">دخول الغرفة</div>
        <div class="btn" id="rightBtn">▶</div>
    </div>

    <script>
        const player = document.getElementById('player');
        const monster = document.getElementById('monster');
        const timerText = document.getElementById('timerText');
        const statusMsg = document.getElementById('statusMsg');
        const scoreText = document.getElementById('scoreText');
        const overlayScreen = document.getElementById('overlayScreen');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlayDesc = document.getElementById('overlayDesc');
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');
        const actionBtn = document.getElementById('actionBtn');

        const houseWidth = document.getElementById('houseArea').clientWidth - 8; 
        const roomWidth = houseWidth / 7; 

        let playerX = houseWidth / 2 - 15; 
        let currentRoomIdx = -1; 
        let isHiding = false; 
        let score = 0;
        let timeLeft = 10;
        let timerInterval = null;
        let gamePhase = "hide"; 

        let touchLeft = false;
        let touchRight = false;
        let keys = { ArrowLeft: false, ArrowRight: false };
        const moveSpeed = 4.5; 

        player.style.left = playerX + 'px';

        // 1. حركة مستمرة ودعم الضغط المطول
        function updateMovement() {
            if (gamePhase === "hide" && !isHiding) {
                if (keys.ArrowLeft || touchLeft) {
                    if (playerX > 5) playerX -= moveSpeed;
                }
                if (keys.ArrowRight || touchRight) {
                    if (playerX < (houseWidth - 35)) playerX += moveSpeed;
                }
                player.style.left = playerX + 'px';
                
                let estimatedRoom = Math.floor((playerX + 15) / roomWidth);
                estimatedRoom = Math.max(0, Math.min(6, estimatedRoom));
                actionBtn.innerText = `دخول غـ ${estimatedRoom + 1}`;
            }
            requestAnimationFrame(updateMovement);
        }
        requestAnimationFrame(updateMovement);

        // 2. دخول وخروج من الغرف
        function toggleRoom() {
            if (gamePhase !== "hide") return;

            if (!isHiding) {
                currentRoomIdx = Math.floor((playerX + 15) / roomWidth);
                currentRoomIdx = Math.max(0, Math.min(6, currentRoomIdx));
                
                let targetX = (currentRoomIdx * roomWidth) + (roomWidth / 2) - 15;
                playerX = targetX;
                player.style.left = playerX + 'px';
                
                player.style.bottom = "160px";
                isHiding = true;
                actionBtn.innerText = "خروج للممر";
                statusMsg.innerText = `أنت مختبئ الآن في [الغرفة ${currentRoomIdx + 1}] 🤫`;
            } else {
                player.style.bottom = "15px";
                isHiding = false;
                currentRoomIdx = -1;
                actionBtn.innerText = "دخول الغرفة";
                statusMsg.innerText = "اختر غرفة واختبئ فيها بسرعة! 🏃‍♂️";
            }
        }
        actionBtn.addEventListener('click', toggleRoom);

        // التحكم بالكيبورد واللمس المطول للـ mobile
        window.addEventListener('keydown', (e) => { if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') keys[e.key] = true; if (e.key === ' ' || e.key === 'Enter') toggleRoom(); });
        window.addEventListener('keyup', (e) => { if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') keys[e.key] = false; });

        leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); touchLeft = true; });
        leftBtn.addEventListener('touchend', () => { touchLeft = false; });
        leftBtn.addEventListener('mousedown', () => { touchLeft = true; });
        leftBtn.addEventListener('mouseup', () => { touchLeft = false; });
        leftBtn.addEventListener('mouseleave', () => { touchLeft = false; });

        rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); touchRight = true; });
        rightBtn.addEventListener('touchend', () => { touchRight = false; });
        rightBtn.addEventListener('mousedown', () => { touchRight = true; });
        rightBtn.addEventListener('mouseup', () => { touchRight = false; });
        rightBtn.addEventListener('mouseleave', () => { touchRight = false; });

        // 3. إدارة الجولات والعداد التنازلي (10 ثواني)
        function initRound() {
            overlayScreen.style.display = 'none';
            for(let i=0; i<7; i++) { document.getElementById(`room${i}`).className = "room"; }
            
            timeLeft = 10;
            gamePhase = "hide";
            isHiding = false;
            currentRoomIdx = -1;
            playerX = houseWidth / 2 - 15;
            player.style.left = playerX + 'px';
            player.style.bottom = "15px";
            monster.style.left = "-60px"; 
            actionBtn.innerText = "دخول الغرفة";
            statusMsg.innerText = "اختر غرفة واختبئ فيها بسرعة! 🏃‍♂️";
            timerText.innerText = `الوقت المتبقي: ${timeLeft}ث`;
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerText.innerText = `الوقت المتبقي: ${timeLeft}ث`;
                if (timeLeft <= 0) { clearInterval(timerInterval); startMonsterPhase(); }
            }, 1000);
        }

        // 4. تفتيش الـ 4 غرف عشوائياً بواسطة الوحش
        function startMonsterPhase() {
            gamePhase = "monster";
            timerText.innerText = "الوحش يبحث حالياً! 💀";
            statusMsg.innerText = "الوحش اقتحم المنزل... ترقب بحذر!";
            
            if (!isHiding || currentRoomIdx === -1) {
                setTimeout(() => { endGame(false, "لم تختبئ في أي غرفة وبقيت في الممر! الوحش التهمك فوراً! 😭"); }, 1000);
                return;
            }

            let allRooms = [0, 1, 2, 3, 4, 5, 6];
            let searchedRooms = [];
            
            // اختيار 4 غرف عشوائية تماماً بدون تكرار في هذه الجولة
            for (let i = 0; i < 4; i++) {
                let randomIndex = Math.floor(Math.random() * allRooms.length);
                searchedRooms.push(allRooms[randomIndex]);
                allRooms.splice(randomIndex, 1); 
            }

            let step = 0;
            function searchNext() {
                if (step < searchedRooms.length) {
                    let targetRoom = searchedRooms[step];
                    let monsterTargetX = (targetRoom * roomWidth) + (roomWidth / 2) - 20;
                    monster.style.left = monsterTargetX + 'px';
                    
                    setTimeout(() => {
                        document.getElementById(`room${targetRoom}`).classList.add('searched');
                        
                        // إذا دخل غرفتك تخسر
                        if (currentRoomIdx === targetRoom) {
                            setTimeout(() => { endGame(false, `الوحش دخل [الغرفة ${targetRoom + 1}] التي كنت فيها وقبض عليك! 💥`); }, 1000);
                            return;
                        }
                        step++;
                        setTimeout(searchNext, 1200); 
                    }, 400);
                } else {
                    // نجاة
                    monster.style.left = houseWidth + 60 + 'px'; 
                    allRooms.forEach(safeIdx => { document.getElementById(`room${safeIdx}`).classList.add('safe'); });
                    setTimeout(() => { endGame(true, `أحسنت! الوحش فتش الغرف الحمراء ولم يجدك، كنت ذكياً في اختيارك! 🎉`); }, 1000);
                }
            }
            setTimeout(searchNext, 1000);
        }

        function endGame(isWin, message) {
            overlayScreen.style.display = 'flex';
            if (isWin) {
                score++;
                overlayTitle.innerText = "نجوت بنجاح! 🏆";
                overlayTitle.style.color = "#10b981";
                overlayDesc.innerText = message;
            } else {
                score = 0; 
                overlayTitle.innerText = "الوحش قيدك! ☠️";
                overlayTitle.style.color = "#ef4444";
                overlayDesc.innerText = message;
            }
            scoreText.innerText = `عدد مرات النجاة المتتالية: ${score}`;
        }

        initRound();
    </script>
</body>
</html>
