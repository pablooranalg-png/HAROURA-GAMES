<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة سباق السيارات - التحكم السلس</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; user-select: none; -webkit-user-select: none; }
        body { background-color: #111827; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: #fff; }
        
        .score-board { font-size: 24px; font-weight: bold; margin-bottom: 10px; color: #f59e0b; text-shadow: 0 0 10px rgba(245,158,11,0.5); }
        
        .game-area { width: 340px; height: 500px; background-color: #374151; position: relative; overflow: hidden; border: 4px solid #1f2937; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .line { width: 10px; height: 80px; background-color: #fff; position: absolute; left: 50%; transform: translateX(-50%); }
        
        .my-car { width: 45px; height: 80px; background-color: #ef4444; position: absolute; bottom: 20px; left: 145px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10; }
        .my-car::before { content: ''; position: absolute; top: 5px; left: 5px; width: 35px; height: 15px; background-color: #38bdf8; border-radius: 4px; }
        .my-car::after { content: ''; position: absolute; bottom: -2px; left: 5px; width: 8px; height: 4px; background-color: #f59e0b; }
        
        .enemy-car { width: 45px; height: 80px; background-color: #10b981; position: absolute; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 5; }
        .enemy-car::before { content: ''; position: absolute; bottom: 5px; left: 5px; width: 35px; height: 15px; background-color: #e2e8f0; border-radius: 4px; }

        .game-over { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); flex-direction: column; justify-content: center; align-items: center; z-index: 20; border-radius: 8px; }
        .game-over h1 { color: #ef4444; font-size: 32px; margin-bottom: 15px; text-shadow: 0 0 10px rgba(239,68,68,0.5); }
        .restart-btn { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; border: none; padding: 12px 30px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(245,158,11,0.4); }
        
        /* أزرار التحكم للتلفون */
        .controls { display: flex; gap: 40px; margin-top: 20px; width: 100%; max-width: 340px; justify-content: center; direction: ltr; }
        .btn { width: 90px; height: 70px; background-color: #1f2937; border: 2px solid #4b5563; border-radius: 12px; color: white; font-size: 28px; font-weight: bold; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); -webkit-tap-highlight-color: transparent; }
        .btn:active { background-color: #374151; transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="score-board">النقاط: <span id="score">0</span></div>

    <div class="game-area" id="gameArea">
        <div class="my-car" id="myCar"></div>
        
        <div class="game-over" id="gameOverScreen">
            <h1>Game Over! 💥</h1>
            <p style="margin-bottom: 20px; font-size: 18px;">لقد تحطمت سيارتك!</p>
            <button class="restart-btn" onclick="startGame()">العب مجدداً</button>
        </div>
    </div>

    <div class="controls">
        <div class="btn" id="leftBtn">◀</div>
        <div class="btn" id="rightBtn">▶</div>
    </div>

    <script>
        const gameArea = document.getElementById('gameArea');
        const myCar = document.getElementById('myCar');
        const scoreSpan = document.getElementById('score');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');

        let carPosition = 145; 
        let score = 0;
        let isGameOver = false;
        let speed = 5; 
        let enemyCars = [];
        let roadLines = [];

        // متغيرات تتبع حالة الضغط (مهمة جداً للتحكم المستمر)
        let keys = { ArrowLeft: false, ArrowRight: false };
        let touchLeft = false;
        let touchRight = false;
        const carTurnSpeed = 4; // سرعة انعطاف السيارة أثناء الضغط المطول

        // 1. إنشاء خطوط الطريق
        for (let i = 0; i < 5; i++) {
            let line = document.createElement('div');
            line.classList.add('line');
            line.style.top = (i * 120) + 'px';
            gameArea.appendChild(line);
            roadLines.push(line);
        }

        // 2. إنشاء السيارات المنافسة
        for (let i = 0; i < 2; i++) {
            let enemy = document.createElement('div');
            enemy.classList.add('enemy-car');
            resetEnemyCar(enemy, i);
            gameArea.appendChild(enemy);
            enemyCars.push(enemy);
        }

        function resetEnemyCar(enemy, index) {
            enemy.style.top = -((index + 1) * 250) + 'px';
            enemy.style.left = Math.floor(Math.random() * 250) + 20 + 'px'; 
            const colors = ['#10b981', '#3b82f6', '#f59e0b', '#ec4899'];
            enemy.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        }

        // 3. حلقة اللعبة الرئيسية وفحص الحركة المستمرة
        function updateGame() {
            if (isGameOver) return;

            // تطبيق الحركة المستمرة بناءً على الأزرار المضغوطة
            if (keys.ArrowLeft || touchLeft) {
                if (carPosition > 15) carPosition -= carTurnSpeed;
            }
            if (keys.ArrowRight || touchRight) {
                if (carPosition < 280) carPosition += carTurnSpeed;
            }
            myCar.style.left = carPosition + 'px';

            // تحريك الطريق
            roadLines.forEach(line => {
                let top = parseInt(line.style.top) + speed;
                if (top >= 500) top = -80;
                line.style.top = top + 'px';
            });

            // تحريك الأعداء
            enemyCars.forEach((enemy, index) => {
                let top = parseInt(enemy.style.top) + speed;
                
                if (top >= 500) {
                    score += 10;
                    scoreSpan.innerText = score;
                    if (score % 50 === 0) speed += 1; 
                    resetEnemyCar(enemy, index);
                } else {
                    enemy.style.top = top + 'px';
                }

                if (isColliding(myCar, enemy)) {
                    endGame();
                }
            });

            requestAnimationFrame(updateGame);
        }

        function isColliding(car1, car2) {
            let r1 = car1.getBoundingClientRect();
            let r2 = car2.getBoundingClientRect();
            return !(r1.left > r2.right || r1.right < r2.left || r1.top > r2.bottom || r1.bottom < r2.top);
        }

        // 4. نظام التحكم المطول المطور (كيبورد + لمس)
        
        // أزرار الكيبورد (الضغط والرفع)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') keys[e.key] = true;
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') keys[e.key] = false;
        });

        // أزرار الشاشة للتلفون (يدعم اللمس المتعدد والمطول والمفاجئ)
        leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); touchLeft = true; });
        leftBtn.addEventListener('touchend', () => { touchLeft = false; });
        leftBtn.addEventListener('mousedown', () => { touchLeft = true; }); // للكمبيوتر بالماوس أيضاً
        leftBtn.addEventListener('mouseup', () => { touchLeft = false; });
        leftBtn.addEventListener('mouseleave', () => { touchLeft = false; });

        rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); touchRight = true; });
        rightBtn.addEventListener('touchend', () => { touchRight = false; });
        rightBtn.addEventListener('mousedown', () => { touchRight = true; });
        rightBtn.addEventListener('mouseup', () => { touchRight = false; });
        rightBtn.addEventListener('mouseleave', () => { touchRight = false; });

        function startGame() {
            isGameOver = false;
            score = 0;
            speed = 5;
            carPosition = 145;
            myCar.style.left = carPosition + 'px';
            scoreSpan.innerText = score;
            gameOverScreen.style.display = 'none';
            keys = { ArrowLeft: false, ArrowRight: false };
            touchLeft = false;
            touchRight = false;

            enemyCars.forEach((enemy, index) => {
                resetEnemyCar(enemy, index);
            });

            updateGame();
        }

        function endGame() {
            isGameOver = true;
            gameOverScreen.style.display = 'flex';
        }

        startGame();
    </script>
</body>
</html>
