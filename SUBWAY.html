<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>صابواي 3D - مود الجحيم والعملات الكثيرة</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #05050a; font-family: sans-serif; user-select: none; }
        
        /* لوحة العدادات */
        #hud { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 30px; z-index: 10; font-size: 28px; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        #scoreBox { color: #ff1f55; }
        #coinBox { color: #ffd700; }

        #gameOverText { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 26px; background: rgba(255,0,0,0.4); border: 2px solid #ff1f55; padding: 25px; border-radius: 15px; text-align: center; z-index: 10; box-shadow: 0 0 25px rgba(255, 31, 85, 0.6); cursor: pointer; }
        #hint { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); color: #fff; background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 20px; font-size: 14px; pointer-events: none; text-align: center; width: 80%; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="hud">
        <div id="scoreBox">🏆 سكور: <span id="score">0</span></div>
        <div id="coinBox">🪙 ذهب: <span id="coins">0</span></div>
    </div>

    <div id="gameOverText" onclick="resetGame()">بلعولك الطريق! 💀<brاكليكي هنا باش تعاود ي</div>
    <div id="hint">اسحب للأعلى للقفز ⬆️ | اسحب يميناً ويساراً للتحرك ↔️</div>

    <script>
        let scene, camera, renderer, playerGroup, obstacles = [], coinsArray = [];
        let score = 0; let coins = 0; let gameOver = false; 
        let speed = 0.55; 
        const lanes = [-2, 0, 2]; let currentLane = 1;
        
        let isJumping = false;
        let jumpVelocity = 0;
        const gravity = -0.016;
        const jumpForce = 0.32;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.FogExp2(0x020205, 0.035);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3.8, 6);
            camera.lookAt(0, 1.5, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1.8);
            light.position.set(5, 10, 7).normalize();
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x222222));

            // الطريق الأصلي
            const roadGeo = new THREE.BoxGeometry(6, 0.1, 100);
            const roadMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.position.z = -40;
            scene.add(road);

            // الروبوت القديم الأصلي (ؤولوت)
            playerGroup = new THREE.Group();
            const blueMat = new THREE.MeshLambertMaterial({ color: 0x00a8ff });
            const whiteMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
            const redMat = new THREE.MeshLambertMaterial({ color: 0xff1f55 });

            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.4), blueMat);
            torso.position.y = 0.8;
            playerGroup.add(torso);

            const head = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.35, 0.35), whiteMat);
            head.position.y = 1.4;
            playerGroup.add(head);

            const leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.5, 0.12), redMat);
            leftArm.position.set(-0.45, 0.8, 0);
            const rightArm = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.5, 0.12), redMat);
            rightArm.position.set(0.45, 0.8, 0);
            playerGroup.add(leftArm, rightArm);

            const leftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.45, 0.18), whiteMat);
            leftLeg.position.set(-0.2, 0.22, 0);
            const rightLeg = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.45, 0.18), whiteMat);
            rightLeg.position.set(0.2, 0.22, 0);
            playerGroup.add(leftLeg, rightLeg);

            playerGroup.position.set(lanes[currentLane], 0, 2);
            scene.add(playerGroup);

            // توقيت توليد مستقل (العوائق تظهر بانتظام، والذهب يظهر بكثرة وسرعة)
            setInterval(spawnObstacle, 750);
            setInterval(spawnCoin, 300); // توليد سريع جداً للأموال كل 300 مللي ثانية

            // نظام السحب (Swipe Controls)
            let touchStartX = 0;
            let touchStartY = 0;

            window.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }, {passive: true});

            window.addEventListener('touchend', (e) => {
                if (gameOver) return;

                let touchEndX = e.changedTouches[0].clientX;
                let touchEndY = e.changedTouches[0].clientY;

                let diffX = touchEndX - touchStartX;
                let diffY = touchEndY - touchStartY;

                if (Math.abs(diffX) > Math.abs(diffY)) {
                    if (diffX > 40) {
                        if (currentLane < 2) currentLane++; 
                    } else if (diffX < -40) {
                        if (currentLane > 0) currentLane--; 
                    }
                } else {
                    if (diffY < -40 && !isJumping) {
                        isJumping = true;
                        jumpVelocity = jumpForce;
                    }
                }
            });

            animate();
        }

        // دالة مخصصة لتوليد الأموال بكثرة
        function spawnCoin() {
            if (gameOver) return;
            const randomLane = Math.floor(Math.random() * 3);
            
            const coinGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.1, 16);
            const coinMat = new THREE.MeshLambertMaterial({ color: 0xffd700 });
            const coinMesh = new THREE.Mesh(coinGeo, coinMat);
            coinMesh.rotation.x = Math.PI / 2; 
            coinMesh.position.set(lanes[randomLane], 0.7, -55);
            scene.add(coinMesh);
            coinsArray.push({ mesh: coinMesh, lane: randomLane });
        }

        // دالة مخصصة لتوليد العوائق بانتظام
        function spawnObstacle() {
            if (gameOver) return;
            const randomLane = Math.floor(Math.random() * 3);

            const isJumpable = Math.random() < 0.35;
            let obsGeo, obsMat, type;

            if (isJumpable) {
                obsGeo = new THREE.BoxGeometry(1.5, 0.35, 0.8);
                obsMat = new THREE.MeshLambertMaterial({ color: 0xf1c40f });
                type = "jumpable";
            } else {
                obsGeo = new THREE.BoxGeometry(1.2, 1.5, 0.8);
                obsMat = new THREE.MeshLambertMaterial({ color: 0xff1f55 });
                type = "tall";
            }

            const obs = new THREE.Mesh(obsGeo, obsMat);
            let posY = isJumpable ? 0.175 : 0.75;
            obs.position.set(lanes[randomLane], posY, -55);
            
            scene.add(obs);
            obstacles.push({ mesh: obs, type: type, lane: randomLane });
        }

        function animate() {
            if (gameOver) return;
            requestAnimationFrame(animate);

            if (isJumping) {
                jumpVelocity += gravity;
                playerGroup.position.y += jumpVelocity;
                if (playerGroup.position.y <= 0) {
                    playerGroup.position.y = 0;
                    isJumping = false;
                    jumpVelocity = 0;
                }
            }

            playerGroup.position.x += (lanes[currentLane] - playerGroup.position.x) * 0.3;

            const textSpeed = Date.now() * (speed * 0.03);
            playerGroup.children[2].rotation.x = Math.sin(textSpeed) * 0.7;
            playerGroup.children[3].rotation.x = -Math.sin(textSpeed) * 0.7;

            // تحريك العملات الكثيرة وكشف الاصطدام
            for (let i = coinsArray.length - 1; i >= 0; i--) {
                let c = coinsArray[i];
                c.mesh.position.z += speed;
                c.mesh.rotation.z += 0.05; 

                if (c.mesh.position.z > 1.4 && c.mesh.position.z < 2.6) {
                    if (c.lane === currentLane) {
                        scene.remove(c.mesh);
                        coinsArray.splice(i, 1);
                        coins++;
                        document.getElementById('coins').innerText = coins;
                        continue;
                    }
                }

                if (c.mesh.position.z > 5) {
                    scene.remove(c.mesh);
                    coinsArray.splice(i, 1);
                }
            }

            // تحريك العوائق الأصلية
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.mesh.position.z += speed;

                if (obs.mesh.position.z > 1.4 && obs.mesh.position.z < 2.6) {
                    if (obs.lane === currentLane) {
                        if (obs.type === "tall") {
                            gameOver = true;
                            document.getElementById('gameOverText').style.display = 'block';
                        } else if (obs.type === "jumpable") {
                            if (playerGroup.position.y < 0.4) {
                                gameOver = true;
                                document.getElementById('gameOverText').style.display = 'block';
                            }
                        }
                    }
                }

                if (obs.mesh.position.z > 5) {
                    scene.remove(obs.mesh);
                    obstacles.splice(i, 1);
                    score++;
                    document.getElementById('score').innerText = score;
                    speed += 0.012; 
                }
            }
            renderer.render(scene, camera);
        }

        function resetGame() {
            gameOver = false; document.getElementById('gameOverText').style.display = 'none';
            score = 0; document.getElementById('score').innerText = score;
            coins = 0; document.getElementById('coins').innerText = coins; speed = 0.55;
            currentLane = 1; playerGroup.position.set(lanes[currentLane], 0, 2);
            isJumping = false; jumpVelocity = 0;
            obstacles.forEach(obs => scene.remove(obs.mesh)); obstacles = [];
            coinsArray.forEach(c => scene.remove(c.mesh)); coinsArray = [];
            animate();
        }
        window.onload = init;
    </script>
</body>
</html>
